<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Professionnels - Barber Paradise</title>
    <meta
      name="description"
      content="Formulaire de prise de contact pour les salons et indépendants."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Contact Professionnel</h1>
        <p class="subtitle">
          Salon, barbier ou indépendant ? Laisse-nous tes infos pour qu’on échange
          sur une collaboration avec Barber Paradise.
        </p>
      </header>

      <section class="card">
        <form id="proForm" novalidate>
          <div class="grid">
            <label class="field">
              <span class="label">Nom du contact</span>
              <input name="nom" autocomplete="name" required maxlength="80" />
              <span class="hint">Obligatoire</span>
            </label>

            <label class="field">
              <span class="label">Nom du salon / activité</span>
              <input name="entreprise" autocomplete="organization" required maxlength="120" />
              <span class="hint">Obligatoire</span>
            </label>

            <label class="field">
              <span class="label">Téléphone</span>
              <input
                name="telephone"
                inputmode="tel"
                autocomplete="tel"
                placeholder="+33 6 12 34 56 78"
                required
                maxlength="30"
              />
              <span class="hint">Obligatoire</span>
            </label>

            <label class="field">
              <span class="label">Email</span>
              <input
                name="email"
                type="email"
                inputmode="email"
                autocomplete="email"
                placeholder="ex: contact@salon.fr"
                required
                maxlength="120"
              />
              <span class="hint">Obligatoire</span>
            </label>
          </div>

          <label class="field">
            <span class="label">Vous êtes un salon ou un indépendant ?</span>
            <textarea
              name="typeActivite"
              rows="2"
              placeholder="Ex : Salon de coiffure, barbier indépendant, institut..."
              required
              maxlength="400"
            ></textarea>
            <span class="hint">Obligatoire</span>
          </label>

          <label class="field">
            <span class="label">Avec quelle marque travaillez-vous actuellement ?</span>
            <textarea
              name="marquesActuelles"
              rows="3"
              placeholder="Listez les marques/produits que vous utilisez aujourd’hui."
              required
              maxlength="600"
            ></textarea>
            <span class="hint">Obligatoire</span>
          </label>

          <label class="field">
            <span class="label">
              Avez-vous repéré ou testé une marque de chez Barber Paradise ?
            </span>
            <textarea
              name="experienceBP"
              rows="3"
              placeholder="Dites-nous ce que vous avez vu/testé ou ce qui vous intéresse."
              maxlength="600"
            ></textarea>
            <span class="hint">Optionnel</span>
          </label>

          <label class="field">
            <span class="label">Qu’attendez-vous d’un fournisseur ?</span>
            <textarea
              name="attentes"
              rows="4"
              placeholder="Ex : régularité des livraisons, formation, marge, exclusivité, nouveautés..."
              required
              maxlength="800"
            ></textarea>
            <span class="hint">Obligatoire</span>
          </label>

          <label class="consent">
            <input id="consentPro" name="consentPro" type="checkbox" required />
            <span>
              J’accepte que mes informations soient utilisées afin d’être recontacté(e)
              par Barber Paradise dans le cadre d’une relation commerciale (emails,
              offres, informations produits).
            </span>
          </label>
          <p class="consentHint">
            Vous pouvez demander la suppression de vos données à tout moment.
          </p>

          <div class="actions">
            <button id="proSubmitBtn" type="submit">Envoyer</button>
            <p id="proStatus" class="status" aria-live="polite"></p>
          </div>
        </form>
      </section>

      <footer class="footer">
        
      </footer>
    </main>

    <script type="module" src="./firebase-config.js"></script>
    <script type="module" src="./pro-app.js"></script>
  </body>
  </html>
