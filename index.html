<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulaire QR</title>
    <meta name="description" content="Formulaire accessible via QR code." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Contact</h1>
        <p class="subtitle">
          Remplis ce formulaire. Les infos seront envoyées en toute simplicité.
        </p>
      </header>

      <section class="card">
        <form id="leadForm" novalidate>
          <div class="grid">
            <label class="field">
              <span class="label">Nom</span>
              <input name="nom" autocomplete="family-name" required maxlength="80" />
              <span class="hint">Obligatoire</span>
            </label>

            <label class="field">
              <span class="label">Prénom</span>
              <input name="prenom" autocomplete="given-name" required maxlength="80" />
              <span class="hint">Obligatoire</span>
            </label>

            <label class="field">
              <span class="label">Téléphone</span>
              <input
                name="telephone"
                inputmode="tel"
                autocomplete="tel"
                placeholder="+33 6 12 34 56 78"
                required
                maxlength="30"
              />
              <span class="hint">Obligatoire</span>
            </label>

            <label class="field">
              <span class="label">Email</span>
              <input
                name="email"
                type="email"
                inputmode="email"
                autocomplete="email"
                placeholder="ex: moi@email.com"
                required
                maxlength="120"
              />
              <span class="hint">Obligatoire</span>
            </label>

            <label class="field">
              <span class="label">TikTok</span>
              <input
                name="tiktok"
                placeholder="https://tiktok.com/@..."
                maxlength="200"
              />
              <span class="hint">Optionnel</span>
            </label>

            <label class="field">
              <span class="label">Instagram</span>
              <input
                name="instagram"
                placeholder="https://instagram.com/..."
                maxlength="200"
              />
              <span class="hint">Optionnel</span>
            </label>

            <label class="field">
              <span class="label">Facebook</span>
              <input
                name="facebook"
                placeholder="https://facebook.com/..."
                maxlength="200"
              />
              <span class="hint">Optionnel</span>
            </label>
          </div>

          <label class="field">
            <span class="label">Sur quoi souhaiterais-tu t'améliorer le plus en formation ?</span>
            <textarea
              name="ameliorer"
              rows="5"
              placeholder="Dis-moi en quelques mots ce que tu veux améliorer…"
              required
              maxlength="1200"
            ></textarea>
            <span class="hint">Obligatoire</span>
          </label>

          <label class="consent">
            <input id="consent" name="consent" type="checkbox" required />
            <span>
              J’accepte que mes informations soient utilisées afin d’être recontacté(e)
              et de recevoir des emails d’informations (et/ou offres) liés à ma demande.
            </span>
          </label>
          <p class="consentHint">
            Vous pouvez demander la suppression de vos données à tout moment.
          </p>

          <div class="actions">
            <button id="submitBtn" type="submit">Envoyer</button>
            <p id="status" class="status" aria-live="polite"></p>
          </div>
        </form>
      </section>

      <footer class="footer">
        
      </footer>
    </main>

    <script type="module" src="./firebase-config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
